[build]
command = "pnpm run build"
publish = "dist"
environment = { NODE_VERSION = "22.22.2" }
edge_functions = "src/server/netlify/edge-functions"

[functions]
directory = "src/server/netlify/functions"

[[redirects]]
from = "/api/*"
to = "/.netlify/functions/:splat"
status = 200

[[redirects]]
from = "/*"
to = "/index.html"
status = 200

[[edge_functions]]
path = "/api/*"
function = "csrf"

[[edge_functions]]
path = "/"
function = "session"

[[edge_functions]]
path = "/activities/*"
function = "session"

[[edge_functions]]
path = "/api/*"
excludedPath = ["/api/signin", "/api/oauthcallback"]
function = "session"

[[edge_functions]]
path = "/api/*"
function = "json"

[[edge_functions]]
path = "/*"
excludedPath = [
  "/api/*",
  "/**/*.js",
  "/**/*.mjs",
  "/**/*.css",
  "/**/*.png",
  "/**/*.jpg",
  "/**/*.jpeg",
  "/**/*.gif",
  "/**/*.svg",
  "/**/*.ico",
  "/**/*.webmanifest",
  "/**/*.woff2",
  "/**/*.woff",
  "/**/*.ttf",
  "/**/*.eot",
  "/**/*.otf",
  "/**/*.mp4",
  "/**/*.webm",
  "/**/*.ogg",
  "/**/*.mp3",
  "/**/*.wav",
  "/**/*.ts",
  "/**/*.tsx",
]
function = "csp"

[dev]
command = "vite"
port = 8888
